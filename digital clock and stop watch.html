<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock and Stopwatch</title>
    <style>
     body{
          font-family:Arial;
          text-align:center;
          background-color:#222;
          color:white;
          margin-top:80px;
       }
       .box{
         margin:30px;
         padding:20px;
         border:2px solid white;
         display:inline-block;
         border-radius:10px;
         }
          h2{
             color:cyan;
           }
            #clock, #display{
               font-size:50px;
               margin:20px;
             }
              button{
                padding:10px 15px;
                margin:5px;
                font-size:18px;
                cursor:pointer;
             }
     </style>
</head>
<body>
<div class="box">
    <h2>Digital Clock</h2>
    <div id="clock">00:00:00</div>
</div>
<div class="box">
     <h2>Stopwach</h2>
     <div id="display">00:00:00</div>
     <br>
     <button onclick="startWatch()">Start</
button>
     <button onclick="stopWatch()">Stop</button>
     <button onclick="resetWatch()">Reset</
button>
</div>
<script>
function showTime(){
   let date = new Date();
   let h = date.getHours();
   let m = date.getMinutes();
   let s = date.getSeconds();
   h = (h<10) ? "0" + h : h;
   m = (m<10) ? "0" + m : m;
   s = (s<10) ? "0" + s : s;
document.getElementById("clock").innerHTML
=
   h + ":" + m + ":" + s;
}
setInterval(showTime,1000);
showTime();
let seconds = 0;
let minutes = 0;
let hours = 0;
let timer = null;
    function updateDisplay(){
   let h = hours < 10 ? "0" + hours : hours;
   let m = minutes < 10 ? "0" + minutes : minutes;
   let s = seconds < 10 ?  "0" + seconds : seconds;
document.getElementById("display").innerHTML=
    h + ":" + m + ":" + s;
  }
   function runwatch(){
    seconds++;
    if(seconds==60){
        seconds=0;
         minutes++;
     }
    if(minutes==60){
       minutes=0;
       hours++;
    }
     updateDisplay();
   }
   function startWatch(){
     if(timer != null){
      clearInterval(timer);
      }
         timer = setInterval(runwatch,1000);
     }
      function stopWatch(){
          clearInterval(timer);
       }
function resetWatch(){
          clearInterval(timer);
     seconds = 0;
     minutes = 0;
     hours = 0;
     updateDisplay();
   }
</script>
</body>
</html>
